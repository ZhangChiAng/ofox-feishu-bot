name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --locked

      - name: Run Ruff lint
        run: uv run --locked ruff check app

      - name: Check Ruff formatting
        run: uv run --locked ruff format --check app

      - name: Compile Python modules
        run: uv run --locked python -m compileall app

      - name: Run tests
        run: uv run --locked pytest
